<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecodeLabs | Project 1 Static Webpage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        <div class="logo-container">
            <h1>DecodeLabs</h1>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero-container" id="home">
            <div class="hero-content">
                <h2>Main Headline Here</h2>
                <p>Foundations of Visual Architecture & Technical Integrity</p>
                <a href="#action" class="btn-cta">Call To Action</a>
            </div>
            <div class="hero-image">
                <img src="placeholder.jpg" alt="Hero representation">
            </div>
        </section>

        <section class="content-grid" id="services">
            <div class="grid-item">
                <img src="img1.jpg" alt="Feature 1">
                <h3>Feature Text</h3>
            </div>
            <div class="grid-item">
                <img src="img2.jpg" alt="Feature 2">
                <h3>Feature Text</h3>
            </div>
            <div class="grid-item">
                <img src="img3.jpg" alt="Feature 3">
                <h3>Feature Text</h3>
            </div>
        </section>
    </main>

    <footer class="site-footer" id="contact">
        <div class="contact-info-block">
            <h3>Contact Us</h3>
            <p>123 DecodeLabs Way, Engineering Track</p>
        </div>
    </footer>

</body>
</html>
