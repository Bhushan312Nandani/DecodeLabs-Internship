# =============================================================
#  PROJECT-3: pytest.ini
#  pytest configuration file — controls test discovery,
#  output format, and coverage thresholds for the CI pipeline.
# =============================================================
[pytest]

# ── Test Discovery ────────────────────────────────────────────
# Tell pytest where to find tests — keeps the project organised
testpaths = tests

# ── Output Verbosity ─────────────────────────────────────────
# -v       → show each test name (pass/fail)
# -p no:warnings → suppress deprecation warnings in CI output
addopts = -v -p no:warnings

# ── Markers ──────────────────────────────────────────────────
# Custom markers allow: pytest -m "not slow" to skip slow tests in CI
markers =
    slow: marks tests as slow (use --runslow to include)
    integration: marks integration tests
    unit: marks unit tests
